<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
      rel="stylesheet"
    />
    <title>Electronics Sales Power BI Report</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Google Sans Flex", sans-serif;
        background: linear-gradient(
          180deg,
          #eef2ff 0%,
          #f8fafc 45%,
          #f8fafc 100%
        );
        color: #1e293b;
      }

      .container {
        max-width: 1360px;
        margin: 0 auto;
        padding: 28px 16px 40px;
      }

      .hero {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.07);
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
        line-height: 1;
        font-weight: 900;
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin: 0;
        color: #475569;
        max-width: 75ch;
      }

      .meta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 14px;
        padding: 7px 12px;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 500;
        background: #eef2ff;
        color: #3730a3;
      }

      .card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }

      .embed-wrapper {
        width: 100%;
        min-height: 740px;
        background: #ffffff;
      }

      iframe {
        width: 100%;
        height: clamp(620px, 80vh, 800px);
        border: 0;
      }

      @media (max-width: 768px) {
        .container {
          padding-top: 20px;
        }

        .hero {
          padding: 16px;
        }

        footer {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>Electronics Sales Dashboard</h1>
        <p class="subtitle">
          Power BI report embedded on a public webpage using an iframe link.
        </p>
        <span class="meta">Power BI Week 3 Assignment • Eddy Odhiambo</span>
      </header>

      <section class="card">
        <div class="embed-wrapper">
          <iframe
            title="Electronics Sales Power BI Report"
            src="https://app.powerbi.com/reportEmbed?reportId=2aeff3e3-a08a-473c-aa8d-3b54b3ebda95&autoAuth=true&ctid=c95984e8-6a70-4512-a440-1c79bca9cc37"
            allowfullscreen="true"
          ></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
